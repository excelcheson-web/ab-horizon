<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Navy rounded-square background -->
  <rect width="48" height="48" rx="11" fill="#0d1b4b"/>
  <!-- Gold border ring -->
  <rect x="1.5" y="1.5" width="45" height="45" rx="9.5" fill="none" stroke="#c9a23a" stroke-width="1.5"/>
  <!-- "O" in gold, matching the logo badge style -->
  <text
    x="24" y="33"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="900"
    fill="#e5c96e"
    text-anchor="middle"
    letter-spacing="-0.5"
  >O</text>
</svg>
