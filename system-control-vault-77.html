<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Vault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #080f2a 0%, #0d1b4b 50%, #080f2a 100%);
      color: #e0ece0;
      min-height: 100dvh;
      display: flex;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sv-sidebar {
      width: 220px;
      min-height: 100dvh;
      background: rgba(0,10,30,.55);
      border-right: 1px solid rgba(26,86,219,.15);
      padding: 28px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    .sv-sidebar-brand {
      text-align: center;
      margin-bottom: 24px;
      padding: 0 16px;
    }
    .sv-sidebar-brand h1 {
      font-size: 1rem;
      font-weight: 800;
      color: #00e676;
      letter-spacing: .5px;
    }
    .sv-sidebar-brand p {
      font-size: .7rem;
      color: rgba(255,255,255,.35);
      margin-top: 3px;
    }
    .sv-section-label {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,.3);
      padding: 14px 18px 6px;
    }
    .sv-nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 18px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.55);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      text-align: left;
    }
    .sv-nav-btn:hover { background: rgba(26,86,219,.1); color: #fff; }
    .sv-nav-btn.active {
      background: rgba(26,86,219,.18);
      color: #00e676;
      border-right: 3px solid #00e676;
    }
    .sv-nav-btn svg { flex-shrink: 0; }

    /* ── Main content ────────────────────────────── */
    .sv-main {
      flex: 1;
      padding: 32px 28px;
      max-width: 600px;
      overflow-y: auto;
    }
    .sv-panel { display: none; }
    .sv-panel.active { display: block; }
    .sv-panel-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sv-panel-title .icon {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: rgba(26,86,219,.15);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Vault Card ──────────────────────────────── */
    .vault-card {
      background: rgba(13,27,75,.35);
      border: 1px solid rgba(26,86,219,.18);
      border-radius: 16px;
      padding: 22px 18px;
      margin-bottom: 16px;
    }
    .vault-card h3 {
      font-size: .88rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: .76rem;
      color: rgba(255,255,255,.5);
      font-weight: 600;
      margin-bottom: 5px;
    }
    input[type="number"], input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid rgba(26,86,219,.25);
      border-radius: 10px;
      background: rgba(0,20,0,.4);
      color: #fff;
      font-size: .9rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    select option { background: #0d2818; color: #fff; }
    input:focus, select:focus { border-color: #00c853; }
    input::placeholder { color: rgba(255,255,255,.25); }
    .balance-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(26,86,219,.08);
      border: 1px solid rgba(26,86,219,.12);
      margin-bottom: 14px;
    }
    .balance-display span:first-child {
      font-size: .78rem;
      color: rgba(255,255,255,.5);
    }
    .balance-display .bal-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #00e676;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 13px;
      border: none; border-radius: 11px;
      font-size: .88rem; font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: linear-gradient(135deg, #0d1b4b, #c9a23a);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(26,86,219,.1);
      border: 1.5px solid rgba(26,86,219,.3);
      color: #00e676;
      margin-top: 8px;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .feedback {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      margin-top: 10px;
      display: none;
    }
    .feedback.success {
      display: block;
      background: rgba(0,230,118,.08);
      border: 1px solid rgba(0,230,118,.2);
      color: #00e676;
    }
    .feedback.error {
      display: block;
      background: rgba(255,82,82,.08);
      border: 1px solid rgba(255,82,82,.2);
      color: #ff5252;
    }
    .link-box {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      background: rgba(0,20,0,.4);
      border: 1px solid rgba(26,86,219,.2);
      color: #00e676;
      font-size: .8rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
      margin-top: 10px;
      display: none;
    }
    .memo-input { font-size: .82rem; }
    .log-area {
      margin-top: 14px;
      max-height: 140px;
      overflow-y: auto;
      font-size: .74rem;
      color: rgba(255,255,255,.4);
      border-top: 1px solid rgba(255,255,255,.05);
      padding-top: 10px;
    }
    .log-area .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .log-area .log-entry .log-time { color: rgba(255,255,255,.25); margin-right: 6px; }
    .log-area .log-entry .log-amt { color: #00e676; font-weight: 600; }

    /* ── Toast ────────────────────────────────────── */
    .sv-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .84rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    .sv-toast.visible { opacity: 1; transform: translateY(0); }
    .sv-toast.success { background: rgba(0,230,118,.12); border: 1px solid rgba(0,230,118,.3); color: #00e676; }
    .sv-toast.error { background: rgba(255,82,82,.12); border: 1px solid rgba(255,82,82,.3); color: #ff5252; }

    /* ── User info row ───────────────────────────── */
    .user-info-row {
      display: flex; gap: 10px; margin-bottom: 12px;
    }
    .user-info-box {
      flex: 1;
      padding: 10px 12px;
      border-radius: 9px;
      background: rgba(26,86,219,.08);
      border: 1px solid rgba(26,86,219,.12);
      text-align: center;
    }
    .user-info-box .info-label {
      font-size: .68rem;
      color: rgba(255,255,255,.4);
      margin-bottom: 3px;
    }
    .user-info-box .info-value {
      font-size: .95rem;
      font-weight: 700;
      color: #00e676;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sv-sidebar {
        width: 100%;
        min-height: auto;
        flex-direction: row;
        overflow-x: auto;
        padding: 10px 8px;
        gap: 0;
        border-right: none;
        border-bottom: 1px solid rgba(26,86,219,.15);
      }
      .sv-sidebar-brand, .sv-section-label { display: none; }
      .sv-nav-btn {
        flex-shrink: 0;
        padding: 8px 14px;
        font-size: .76rem;
        border-right: none !important;
        border-radius: 8px;
      }
      .sv-nav-btn.active { border-right: none !important; border-bottom: 2px solid #00e676; }
      .sv-main { padding: 20px 14px; max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ── Sidebar Navigation ───────────────────────── -->
  <nav class="sv-sidebar">
    <div class="sv-sidebar-brand">
      <h1>⚙ System Vault</h1>
      <p>Authorized personnel only</p>
    </div>

    <div class="sv-section-label">User Management</div>
    <button class="sv-nav-btn active" onclick="showPanel('credit')" id="nav-credit">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Credit Account
    </button>
    <button class="sv-nav-btn" onclick="showPanel('applink')" id="nav-applink">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      App Link
    </button>

    <div class="sv-section-label">Vault Controls</div>
    <button class="sv-nav-btn" onclick="showPanel('vault')" id="nav-vault">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Savings Vault
    </button>
  </nav>

  <!-- ── Toast notification ───────────────────────── -->
  <div class="sv-toast" id="svToast"></div>

  <!-- ── Main Content ─────────────────────────────── -->
  <div class="sv-main">

    <!-- ── PANEL: Credit Account ────────────────── -->
    <div class="sv-panel active" id="panel-credit">
      <div class="sv-panel-title">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </span>
        Credit Account
      </div>
      <div class="vault-card">
        <div class="balance-display">
          <span>Current Balance</span>
          <span class="bal-value" id="currentBalance">$0.00</span>
        </div>
        <label for="creditAmount">Credit Amount (USD)</label>
        <input type="number" id="creditAmount" placeholder="Enter amount" min="0.01" step="0.01" />
        <label for="creditMemo">Memo (optional)</label>
        <input type="text" id="creditMemo" class="memo-input" placeholder="e.g. Salary deposit, Refund" maxlength="120" />
        <button class="btn btn-primary" id="creditBtn" onclick="creditAccount()">Credit Account</button>
        <div class="feedback" id="creditFeedback"></div>
        <div class="log-area" id="creditLog"></div>
      </div>
    </div>

    <!-- ── PANEL: Generate App Link ─────────────── -->
    <div class="sv-panel" id="panel-applink">
      <div class="sv-panel-title">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </span>
        Generate App Link
      </div>
      <div class="vault-card">
        <p style="font-size:.78rem;color:rgba(255,255,255,.45);margin-bottom:14px;">Get the main dashboard URL to navigate between pages.</p>
        <button class="btn btn-secondary" onclick="generateAppLink()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Generate Link
        </button>
        <div class="link-box" id="appLinkBox"></div>
      </div>
    </div>

    <!-- ── PANEL: Savings Vault Fund Movement ───── -->
    <div class="sv-panel" id="panel-vault">
      <div class="sv-panel-title">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00e676" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        Savings Vault Transfer
      </div>
      <div class="vault-card">
        <h3>Move Funds — Main ↔ Savings Vault</h3>

        <label for="vaultUserSelect">Select User</label>
        <div style="display:flex;gap:8px;margin-bottom:4px;">
          <select id="vaultUserSelect" style="margin-bottom:0;flex:1;">
            <option value="">— Load users first —</option>
          </select>
          <button class="btn btn-secondary" style="width:auto;padding:10px 16px;margin-top:0;flex-shrink:0;font-size:.78rem;" disabled>
            🔄 Load
          </button>
        </div>
        <div style="height:8px;"></div>

        <!-- User balance info -->
        <div class="user-info-row" id="vaultUserInfo" style="display:none;">
          <div class="user-info-box">
            <div class="info-label">Main Balance</div>
            <div class="info-value" id="vuMainBal">$0.00</div>
          </div>
          <div class="user-info-box">
            <div class="info-label">Savings Vault</div>
            <div class="info-value" id="vuVaultBal">$0.00</div>
          </div>
        </div>

        <label for="vaultDirection">Direction</label>
        <select id="vaultDirection">
          <option value="main-to-vault">Main → Savings Vault</option>
          <option value="vault-to-main">Savings Vault → Main</option>
        </select>

        <label for="vaultAmount">Amount (USD)</label>
        <input type="number" id="vaultAmount" placeholder="Enter amount" min="0.01" step="0.01" />

        <button class="btn btn-primary" id="vaultTransferBtn" onclick="handleVaultTransfer()">
          💸 Transfer Funds (Main → Vault)
        </button>
        <div class="feedback" id="vaultFeedback"></div>
        <div class="log-area" id="vaultLog"></div>
      </div>
    </div>

  </div>


  <!-- ── Supabase Admin/User Management ─────────────── -->
  <script type="module" src="/admin-supabase.js"></script>

  <script>
    /* ── Helpers ─────────────────────────────────── */
    function fmt(n) {
      return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function now() {
      return new Date().toLocaleString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    /* ── Toast ────────────────────────────────────── */
    var toastTimer;
    function showToast(type, msg) {
      var el = document.getElementById('svToast');
      el.textContent = msg;
      el.className = 'sv-toast ' + type;
      requestAnimationFrame(function () { el.classList.add('visible'); });
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.classList.remove('visible'); }, 3500);
    }

    /* ── Sidebar navigation ──────────────────────── */
    function showPanel(id) {
      document.querySelectorAll('.sv-panel').forEach(function (p) { p.classList.remove('active'); });
      document.querySelectorAll('.sv-nav-btn').forEach(function (b) { b.classList.remove('active'); });
      var panel = document.getElementById('panel-' + id);
      var nav = document.getElementById('nav-' + id);
      if (panel) panel.classList.add('active');
      if (nav) nav.classList.add('active');
    }

    /* ── Load current balance (localStorage) ─────── */
    function loadBalance() {
      var bal = parseFloat(localStorage.getItem('bank_balance') || '0');
      document.getElementById('currentBalance').textContent = '$' + fmt(bal);
      return bal;
    }

    /* ── Credit account ──────────────────────────── */
    function creditAccount() {
      var fb = document.getElementById('creditFeedback');
      var input = document.getElementById('creditAmount');
      var memo = document.getElementById('creditMemo').value.trim();
      var amt = parseFloat(input.value);

      fb.className = 'feedback';
      fb.style.display = 'none';

      if (!amt || amt <= 0 || amt > 999999999) {
        fb.className = 'feedback error';
        fb.textContent = 'Enter a valid amount (greater than 0).';
        fb.style.display = 'block';
        return;
      }

      var current = parseFloat(localStorage.getItem('bank_balance') || '0');
      var newBal = current + amt;

      localStorage.setItem('bank_balance', newBal.toFixed(2));

      try {
        window.dispatchEvent(new StorageEvent('storage', {
          key: 'bank_balance',
          newValue: newBal.toFixed(2),
          oldValue: current.toFixed(2),
          storageArea: localStorage
        }));
      } catch(e) {}

      var history = [];
      try { history = JSON.parse(localStorage.getItem('transfer_history') || '[]'); } catch(e) {}
      history.unshift({
        id: 'CR-' + Date.now(),
        ref: 'CR-' + Date.now(),
        type: 'credit',
        beneficiary: 'Account Credit',
        amount: amt,
        balanceAfter: newBal,
        date: new Date().toISOString(),
        memo: memo || 'Admin credit'
      });
      localStorage.setItem('transfer_history', JSON.stringify(history));

      loadBalance();
      fb.className = 'feedback success';
      fb.textContent = '\u2713 $' + fmt(amt) + ' credited successfully. New balance: $' + fmt(newBal);
      fb.style.display = 'block';

      var log = document.getElementById('creditLog');
      var entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = '<span class="log-time">' + escHtml(now()) + '</span> <span class="log-amt">+$' + fmt(amt) + '</span> \u2192 $' + fmt(newBal) + (memo ? ' \u2014 ' + escHtml(memo) : '');
      log.prepend(entry);

      input.value = '';
      document.getElementById('creditMemo').value = '';
    }

    /* ── Generate app link ───────────────────────── */
    function generateAppLink() {
      var origin = window.location.origin;
      var base = window.location.pathname.replace(/[^/]*$/, '');
      var link = origin + base + 'index.html';
      var box = document.getElementById('appLinkBox');
      box.textContent = link;
      box.style.display = 'block';
    }


    // --- Supabase-based user management ---
    import { fetchAllUsers, updateUser, getUser } from '/admin-supabase.js';
    var cachedUsers = [];
    async function loadSupabaseUsers() {
      var btn = document.querySelector('[onclick="loadSupabaseUsers()"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        cachedUsers = await fetchAllUsers();
        var sel = document.getElementById('vaultUserSelect');
        sel.innerHTML = '<option value="">— Select a user —</option>';
        cachedUsers.forEach(function (u) {
          var opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = (u.name || u.email || u.id) + ' — $' + fmt(u.balance || 0);
          sel.appendChild(opt);
        });
        showToast('success', 'Loaded ' + cachedUsers.length + ' user(s).');
      } catch (err) {
        showToast('error', 'Failed to load users: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔄 Load';
      }
    }

    /* ── Vault: show selected user balances ──────── */
    document.getElementById('vaultUserSelect').addEventListener('change', async function () {
      var uid = this.value;
      var infoRow = document.getElementById('vaultUserInfo');
      if (!uid) { infoRow.style.display = 'none'; return; }
      var user = cachedUsers.find(function (u) { return u.id === uid; });
      if (!user) { infoRow.style.display = 'none'; return; }
      document.getElementById('vuMainBal').textContent = '$' + fmt(user.balance || 0);
      document.getElementById('vuVaultBal').textContent = '$' + fmt(user.savingsVault || 0);
      infoRow.style.display = 'flex';
    });

    /* ── Vault: update button label on direction change ── */
    document.getElementById('vaultDirection').addEventListener('change', function () {
      var btn = document.getElementById('vaultTransferBtn');
      if (this.value === 'main-to-vault') {
        btn.innerHTML = '💸 Transfer Funds (Main → Vault)';
      } else {
        btn.innerHTML = '💸 Transfer Funds (Vault → Main)';
      }
    });

    /* ── Vault: handle fund transfer ─────────────── */

    async function handleVaultTransfer() {
      var fb = document.getElementById('vaultFeedback');
      fb.className = 'feedback'; fb.style.display = 'none';

      var uid = document.getElementById('vaultUserSelect').value;
      if (!uid) { showToast('error', 'Please select a user.'); return; }

      var amt = parseFloat(document.getElementById('vaultAmount').value);
      if (!amt || amt <= 0) { showToast('error', 'Enter a valid amount.'); return; }

      var direction = document.getElementById('vaultDirection').value;
      var btn = document.getElementById('vaultTransferBtn');
      btn.disabled = true;
      var origLabel = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Processing…';

      try {
        var user = await getUser(uid);
        var mainBal = user.balance || 0;
        var vaultBal = user.savingsVault || 0;

        if (direction === 'main-to-vault') {
          if (amt > mainBal) { showToast('error', 'Insufficient main balance ($' + fmt(mainBal) + ').'); return; }
          await updateUser(uid, { balance: mainBal - amt, savingsVault: vaultBal + amt });
          showToast('success', 'Moved $' + fmt(amt) + ' Main → Savings Vault');
          fb.className = 'feedback success';
          fb.textContent = '✓ $' + fmt(amt) + ' moved to Savings Vault. New vault: $' + fmt(vaultBal + amt);
        } else {
          if (amt > vaultBal) { showToast('error', 'Insufficient vault balance ($' + fmt(vaultBal) + ').'); return; }
          await updateUser(uid, { balance: mainBal + amt, savingsVault: vaultBal - amt });
          showToast('success', 'Moved $' + fmt(amt) + ' Savings Vault → Main');
          fb.className = 'feedback success';
          fb.textContent = '✓ $' + fmt(amt) + ' moved to Main Balance. New main: $' + fmt(mainBal + amt);
        }
        fb.style.display = 'block';

        /* Update cached user data & info row */
        var userObj = cachedUsers.find(function (u) { return u.id === uid; });
        if (userObj) {
          if (direction === 'main-to-vault') {
            userObj.balance = mainBal - amt;
            userObj.savingsVault = vaultBal + amt;
          } else {
            userObj.balance = mainBal + amt;
            userObj.savingsVault = vaultBal - amt;
          }
          document.getElementById('vuMainBal').textContent = '$' + fmt(userObj.balance);
          document.getElementById('vuVaultBal').textContent = '$' + fmt(userObj.savingsVault);
        }

        /* Add to local log */
        var log = document.getElementById('vaultLog');
        var entry = document.createElement('div');
        entry.className = 'log-entry';
        var userName = (user.name || user.email || uid);
        entry.innerHTML = '<span class="log-time">' + escHtml(now()) + '</span> <span class="log-amt">' +
          (direction === 'main-to-vault' ? 'Main→Vault' : 'Vault→Main') +
          ' $' + fmt(amt) + '</span> — ' + escHtml(userName);
        log.prepend(entry);

        document.getElementById('vaultAmount').value = '';
      } catch (err) {
        showToast('error', 'Transfer failed: ' + err.message);
        fb.className = 'feedback error';
        fb.textContent = 'Error: ' + err.message;
        fb.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = origLabel;
      }
    }

    /* ── Init ────────────────────────────────────── */
    loadBalance();
    window.addEventListener('storage', function(e) {
      if (e.key === 'bank_balance') loadBalance();
    });
  </script>
</body>
</html>
